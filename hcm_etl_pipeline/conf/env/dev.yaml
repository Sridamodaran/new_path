# conf/env/dev.yaml
# Development environment config

storage:
  landing: /data/landing
  raw: /data/raw
  staging: /data/staging
  presentation: /data/presentation
  audit: /data/audit

hive:
  database: hcm_dev
  warehouse: /user/hive/warehouse/hcm_dev

spark:
  spark.executor.memory: 2g
  spark.driver.memory: 1g
  spark.sql.shuffle.partitions: 10

dq:
  soft_fail_threshold: 0.05   # Alert if >5% rows are soft-fail

contract_versions:
  employee_master: v1
  payroll_transactions: v1

alerts:
  enabled: false
  smtp_host: mail.myorg.com
  smtp_port: 587
  from_email: pipeline-alerts@myorg.com
  to_emails:
    - de-team@myorg.com
  slack_webhook: ""
