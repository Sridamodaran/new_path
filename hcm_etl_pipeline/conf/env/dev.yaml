# conf/env/dev.yaml
# Development environment config

storage:
  landing: \\wsl.localhost\Ubuntu\home\srid01\hcm\myproject\data\landing
  raw: \\wsl.localhost\Ubuntu\home\srid01\hcm\myproject\data\raw
  staging: \\wsl.localhost\Ubuntu\home\srid01\hcm\myproject\data\staging
  presentation: \\wsl.localhost\Ubuntu\home\srid01\hcm\myproject\data\presentation
  audit: \\wsl.localhost\Ubuntu\home\srid01\hcm\myproject\data\audit

hive:
  database: hcm_dev
  warehouse: /user/hive/warehouse/hcm_dev

spark:
